name: docs

on:
  # 每当 push 到 docs 分支时触发部署
  push:
    branches: [docs]
  # 手动触发部署
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # "最近更新时间" 等 git 日志相关信息，需要拉取全部提交记录
          fetch-depth: 0

      # 添加缓存步骤
      - name: Cache dependencies and build outputs
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-vitepress-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-vitepress-

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          # 选择要使用的 pnpm 版本
          version: 9
          # 使用 pnpm 安装依赖
          run_install: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 选择要使用的 node 版本
          node-version: 20
          # 缓存 pnpm 依赖
          cache: pnpm

      # 运行构建脚本
      - name: Build VuePress site
        run: pnpm build
      
      # 将docs/CNAME文件复制到docs/.vitepress/dist目录下
      - name: Copy CNAME
        run: cp docs/CNAME docs/.vitepress/dist/CNAME

      # 将docs/baidu_verify_codeva-bHYwzw4l9m.html文件复制到docs/.vitepress/dist目录下
      - name: Copy baidu_verify_codeva-bHYwzw4l9m.html
        run: cp docs/baidu_verify_codeva-bHYwzw4l9m.html docs/.vitepress/dist/baidu_verify_codeva-bHYwzw4l9m.html

      # 查看 workflow 的文档来获取更多信息
      # @see https://github.com/crazy-max/ghaction-github-pages
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          # 部署到 gh-pages 分支
          target_branch: gh-pages
          # 部署目录为 VuePress 的默认输出目录
          build_dir: docs/.vitepress/dist
        env:
          # @see https://docs.github.com/cn/actions/reference/authentication-in-a-workflow#about-the-github_token-secret
          GITHUB_TOKEN: ${{ secrets.DOCS_TOKEN }}

      # rm CNAME
      - name: Remove CNAME
        run: rm -f docs/.vitepress/dist/CNAME

      # # cp vercel.json
      # - name: cp vercel.json
      #   run: cp vercel.json docs/.vitepress/dist/vercel.json

      # rm baidu_verify_codeva-bHYwzw4l9m.html
      - name: Remove baidu_verify_codeva-bHYwzw4l9m.html
        run: rm -f docs/.vitepress/dist/baidu_verify_codeva-bHYwzw4l9m.html

      - name: Push to hanhan0258/karin-docs
        id: push-to-hanhan
        uses: peaceiris/actions-gh-pages@v3
        continue-on-error: true
        with:
          personal_token: ${{ secrets.HANHAN_PUSH }}
          external_repository: hanhan0258/karin-docs
          publish_branch: gh-pages
          publish_dir: docs/.vitepress/dist
          force: true
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
      
      - name: Check hanhan0258/karin-docs push status
        if: steps.push-to-hanhan.outcome == 'failure'
        run: |
          echo "::error::推送到 hanhan0258/karin-docs 仓库失败"
          echo "错误信息: ${{ steps.push-to-hanhan.outputs.error }}"
          
      - name: Push to yusheng929/karin-docs
        id: push-to-yusheng
        uses: peaceiris/actions-gh-pages@v3
        continue-on-error: true
        with:
          personal_token: ${{ secrets.YUSHENG }}
          external_repository: yusheng929/karin-docs
          publish_branch: gh-pages
          publish_dir: docs/.vitepress/dist
          force: true
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Check yusheng929/karin-docs push status  
        if: steps.push-to-yusheng.outcome == 'failure'
        run: |
          echo "::error::推送到 yusheng929/karin-docs 仓库失败"
          echo "错误信息: ${{ steps.push-to-yusheng.outputs.error }}"