[build.environment]
NODE_VERSION = "22"
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
NODE_OPTIONS = "--max-old-space-size=4096"

[build]
publish = "docs/.vuepress/dist"
command = "pnpm run build"

# Deploy preview context (PRs)
# Explicitly defined to ensure every push to a PR triggers a new build
# The command is explicitly set (even though it inherits from [build])
# to make it clear that builds should always run for deploy previews
[context.deploy-preview]
command = "pnpm run build"